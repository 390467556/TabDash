<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabDash</title>

  <!-- Google Fonts: Exo 2 (display) + Archivo (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">



  <!-- ================================================================
       HEADER — greeting on the left
       ================================================================ -->
  <header>
    <div class="header-left">
      <div class="header-brand">
        <svg class="mb-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="47" fill="none" stroke="currentColor" stroke-width="3"/>
          <circle cx="50" cy="50" r="42" fill="none" stroke="currentColor" stroke-width="1.2"/>
          <!-- Three-pointed star: thin arms from center to outer ring -->
          <line x1="50" y1="50" x2="50" y2="8"  stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
          <line x1="50" y1="50" x2="86.36" y2="71" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
          <line x1="50" y1="50" x2="13.64" y2="71" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
          <circle cx="50" cy="50" r="5" fill="currentColor"/>
        </svg>
        <h1 id="greeting"></h1>
      </div>
      <div class="date" id="dateDisplay"></div>
    </div>
    <button class="theme-toggle" id="themeToggle" title="Toggle light / dark mode">
      <!-- Moon icon (shown in dark mode → click to go light) -->
      <svg class="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" /></svg>
      <!-- Sun icon (shown in light mode → click to go dark) -->
      <svg class="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" /></svg>
    </button>
  </header>

  <!-- ================================================================
       SEARCH BAR — global quick-search for history & bookmarks
       ================================================================ -->
  <div class="search-bar" id="searchBar">
    <div class="search-input-wrapper">
      <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
      </svg>
      <input type="text" id="searchInput" placeholder="Search history & bookmarks..." autocomplete="off">
      <kbd class="search-shortcut">/</kbd>
      <button class="organize-btn" data-action="organize-bookmarks" title="Auto-organize loose bookmarks into folders">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 0 1 4.5 9.75h15A2.25 2.25 0 0 1 21.75 12v.75m-8.69-6.44-2.12-2.12a1.5 1.5 0 0 0-1.061-.44H4.5A2.25 2.25 0 0 0 2.25 6v12a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9a2.25 2.25 0 0 0-2.25-2.25h-5.379a1.5 1.5 0 0 1-1.06-.44Z" />
        </svg>
        <span>Organize</span>
      </button>
      <button class="organize-btn restore-btn" id="restoreBookmarksBtn" data-action="restore-bookmarks" title="Restore bookmarks to their original locations" style="display:none">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 15 3 9m0 0 6-6M3 9h12a6 6 0 0 1 0 12h-3" />
        </svg>
        <span>Restore</span>
      </button>
    </div>
    <div class="search-results" id="searchResults" style="display:none"></div>
  </div>

  <!-- ================================================================
       QUICK ACCESS — categorized link grid from config.local.js
       Hidden by default; renderQuickAccess() shows it when data exists
       ================================================================ -->
  <div class="quick-access" id="quickAccessSection" style="display:none">
    <div class="section-header">
      <h2>Frequently visited</h2>
      <div class="section-line"></div>
    </div>
    <div id="quickAccessGrid"></div>
  </div>

  <!-- ================================================================
       TAB OUT DUPES BANNER — appears when you have extra TabDash tabs open
       Hidden by default; app.js shows it when dupeTabOutCount > 1
       ================================================================ -->
  <div class="tab-cleanup-banner" id="tabOutDupeBanner" style="display:none">
    <div class="tab-cleanup-left">
      <div class="tab-cleanup-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 0 1-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 0 1 1.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 0 0-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 0 1-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 0 0-3.375-3.375h-1.5a1.125 1.125 0 0 1-1.125-1.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H9.75" />
        </svg>
      </div>
      <div class="tab-cleanup-text">
        You have <strong id="tabOutDupeCount"></strong> TabDash tabs open. Keep just this one?
      </div>
    </div>
    <button class="tab-cleanup-btn" data-action="close-tabout-dupes">Close extras</button>
  </div>

  <!-- ================================================================
       STALE TAB CLEANUP BANNER — appears when stale tabs are detected
       Hidden by default; app.js shows it when stale tab count > 0
       ================================================================ -->
  <div class="tab-cleanup-banner stale-cleanup-banner" id="staleTabBanner" style="display:none">
    <div class="tab-cleanup-left">
      <div class="tab-cleanup-icon stale-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
        </svg>
      </div>
      <div class="tab-cleanup-text">
        <strong id="staleTabCount"></strong> tabs haven't been viewed in over <strong id="staleThreshold"></strong>. Clean up &amp; save for later?
      </div>
    </div>
    <button class="tab-cleanup-btn stale-cleanup-btn" data-action="close-stale-tabs">Clean up</button>
  </div>

  <!-- ================================================================
       MAIN CONTENT AREA — two-column layout
       Left: open tabs (domain/mission cards)
       Right: saved for later checklist
       The right column only renders when it has items (JS controls this)
       ================================================================ -->
  <div class="dashboard-columns" id="dashboardColumns">

    <!-- LEFT COLUMN: Open tabs -->
    <div class="active-section" id="openTabsSection" style="display:none">
      <div class="section-header">
        <h2 id="openTabsSectionTitle">Right now</h2>
        <div class="section-line"></div>
        <div class="section-count" id="openTabsSectionCount"></div>
      </div>
      <div class="missions" id="openTabsMissions"></div>
    </div>

    <!-- SAVED FOR LATER — collapsed by default, toggle to expand -->
    <div class="deferred-column" id="deferredColumn" style="display:none">
      <!-- Toggle bar — always visible when items exist -->
      <button class="deferred-toggle-bar" id="deferredToggleBar" data-action="toggle-deferred">
        <svg class="deferred-toggle-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" /></svg>
        Saved for later
        <span class="deferred-toggle-count" id="deferredToggleCount"></span>
      </button>

      <!-- Collapsible body — hidden by default -->
      <div class="deferred-body" id="deferredBody" style="display:none">
        <div class="section-header">
          <div class="section-line"></div>
          <div class="section-count" id="deferredCount"></div>
        </div>

        <!-- Active checklist items -->
        <div class="deferred-list" id="deferredList"></div>

        <!-- Empty state -->
        <div class="deferred-empty" id="deferredEmpty" style="display:none">
          Nothing saved. Living in the moment.
        </div>

        <!-- Archive section — collapsed by default -->
        <div class="deferred-archive" id="deferredArchive" style="display:none">
          <button class="archive-toggle" id="archiveToggle">
            <svg class="archive-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" /></svg>
            Archive
            <span class="archive-count" id="archiveCount"></span>
          </button>
          <div class="archive-body" id="archiveBody" style="display:none">
            <input type="text" class="archive-search" id="archiveSearch" placeholder="Search archived tabs...">
            <div class="archive-list" id="archiveList"></div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- end .dashboard-columns -->

  <!-- ================================================================
       FOOTER — global stats + refresh control
       ================================================================ -->
  <footer>
    <div class="footer-stats">
      <div class="stat">
        <div class="stat-num" id="statTabs">—</div>
        <div class="stat-label">Open tabs</div>
      </div>
    </div>
    <div class="last-refresh">
      <a href="https://github.com/390467556/TabDash" target="_top">TabDash</a> by 王哲
    </div>
  </footer>

</div><!-- end .container -->

<!-- ================================================================
     TOAST — floats above everything, used for action confirmations
     Hidden by default via CSS (opacity:0, translateY)
     ================================================================ -->
<div class="toast" id="toast">
  <!-- Checkmark circle icon (Heroicons outline) -->
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
  </svg>
  <span id="toastText"></span>
</div>

<!-- Personal config (gitignored) — defines LOCAL_LANDING_PAGE_PATTERNS etc. -->
<!-- If the file doesn't exist, that's fine — app.js uses sensible defaults. -->
<script src="config.local.js" onerror="/* no personal config, that's fine */"></script>

<!-- Main dashboard logic — loads last so the DOM is ready -->
<script src="app.js"></script>
</body>
</html>
